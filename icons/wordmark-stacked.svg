<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" width="480" height="380" role="img" aria-label="Ink and Echo">
  <defs>
    <clipPath id="wms-clip">
      <rect x="160" y="20" width="160" height="160" rx="36" ry="36"/>
    </clipPath>
    <filter id="wms-bleed" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <radialGradient id="wms-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5A2B" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#8B5A2B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8B5A2B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wms-dotcore" cx="48%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#6F4520" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6F4520" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#wms-clip)">
    <g transform="translate(160 20) scale(0.15625)">
      <rect x="0" y="0" width="1024" height="1024" fill="#FBF7EE"/>
      <g style="mix-blend-mode: multiply" fill="none" stroke="#8B5A2B">
        <circle cx="512" cy="612" r="158" stroke-width="6" opacity="0.46"/>
        <circle cx="512" cy="612" r="252" stroke-width="4.5" opacity="0.28"/>
        <circle cx="512" cy="612" r="348" stroke-width="3" opacity="0.14"/>
      </g>
      <circle cx="512" cy="624" r="110" fill="url(#wms-halo)"/>
      <g filter="url(#wms-bleed)">
        <circle cx="512" cy="626" r="50" fill="#8B5A2B"/>
      </g>
      <circle cx="512" cy="626" r="50" fill="url(#wms-dotcore)"/>
      <g transform="rotate(-6 512 612)">
        <g filter="url(#wms-bleed)">
          <path d="M 436 196 C 428 196, 424 204, 426 218 C 420 296, 420 386, 434 470 C 450 538, 476 580, 512 612 C 548 580, 574 538, 590 470 C 604 386, 604 296, 598 218 C 600 204, 596 196, 588 196 Z" fill="#1F1B16"/>
        </g>
        <line x1="512" y1="382" x2="512" y2="594" stroke="#FBF7EE" stroke-width="14" stroke-linecap="round"/>
        <circle cx="512" cy="370" r="14" fill="#FBF7EE"/>
      </g>
    </g>
  </g>

  <text x="240" y="298" text-anchor="middle" xml:space="preserve"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, 'Times New Roman', serif"
        font-size="64" letter-spacing="-0.7"
   ><tspan font-weight="500" fill="#1F1B16">Ink </tspan><tspan font-weight="400" font-style="italic" fill="#8B5A2B">and</tspan><tspan font-weight="500" fill="#1F1B16"> Echo</tspan></text>
</svg>
