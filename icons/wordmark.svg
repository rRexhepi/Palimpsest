<?xml version="1.0"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" width="920" height="220" role="img" aria-label="Ink and Echo">
  <defs>
    <clipPath id="wmd-clip">
      <rect x="20" y="30" width="160" height="160" rx="36" ry="36"></rect>
    </clipPath>
    <filter id="wmd-bleed" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="3"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="2"></feDisplacementMap>
    </filter>
    <radialGradient id="wmd-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5A2B" stop-opacity="0.18"></stop>
      <stop offset="55%" stop-color="#8B5A2B" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#8B5A2B" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="wmd-dotcore" cx="48%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#6F4520" stop-opacity="0.55"></stop>
      <stop offset="60%" stop-color="#6F4520" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  
  <g clip-path="url(#wmd-clip)">
    <g transform="translate(20 30) scale(0.15625)">
      <rect x="0" y="0" width="1024" height="1024" fill="#FBF7EE"></rect>

      
      <g style="mix-blend-mode: multiply" fill="none" stroke="#8B5A2B">
        <circle cx="512" cy="612" r="158" stroke-width="6" opacity="0.46"></circle>
        <circle cx="512" cy="612" r="252" stroke-width="4.5" opacity="0.28"></circle>
        <circle cx="512" cy="612" r="348" stroke-width="3" opacity="0.14"></circle>
      </g>

      
      <circle cx="512" cy="624" r="110" fill="url(#wmd-halo)"></circle>
      <g filter="url(#wmd-bleed)">
        <circle cx="512" cy="626" r="50" fill="#8B5A2B"></circle>
      </g>
      <circle cx="512" cy="626" r="50" fill="url(#wmd-dotcore)"></circle>

      
      <g transform="rotate(-6 512 612)">
        <g filter="url(#wmd-bleed)">
          <path d="M 436 196 C 428 196, 424 204, 426 218 C 420 296, 420 386, 434 470 C 450 538, 476 580, 512 612 C 548 580, 574 538, 590 470 C 604 386, 604 296, 598 218 C 600 204, 596 196, 588 196 Z" fill="#1F1B16"></path>
        </g>
        <line x1="512" y1="382" x2="512" y2="594" stroke="#FBF7EE" stroke-width="14" stroke-linecap="round"></line>
        <circle cx="512" cy="370" r="14" fill="#FBF7EE"></circle>
      </g>
    </g>
  </g>

  
  <g font-family="Charter, &#39;Iowan Old Style&#39;, Cambria, Georgia, &#39;Times New Roman&#39;, serif" font-size="92" letter-spacing="-1.1" fill="#1F1B16">
    <text x="216" y="138" font-weight="500">Ink</text>
    <text x="356" y="138" font-weight="400" font-style="italic" fill="#8B5A2B">and</text>
    <text x="510" y="138" font-weight="500">Echo</text>
  </g>
</svg>